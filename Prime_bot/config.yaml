llm:
  provider: ollama
  model: qwen3:8b
  base_url: http://192.168.27.207:11434
  keep_alive: 1h
  warmup_on_start: true

embeddings:
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

chroma:
  persist_dir: /app/chroma_db

knowledge_base:
  active_company: prime_bank
  collections:
    all_products: prime_bank_all_products
    conventional_i_need_a_credit_card: prime_bank_conventional_credit_i_need_a_credit_card
    conventional_existing_cardholder: prime_bank_conventional_credit_existing_cardholder
    islami_i_need_a_credit_card: prime_bank_islami_credit_i_need_a_credit_card
    islami_existing_cardholder: prime_bank_islami_credit_existing_cardholder

server:
  host: 0.0.0.0
  port: 8000

features:
  - name: credit_card
    banking_types: [conventional, islami]
    intents:
      - i_need_a_credit_card
      - existing_cardholder
