services:
  ollama:
    image: ollama/ollama:0.14.1
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=2
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=1h
    gpus: all
    networks:
      - primebot-net

  primebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: primebot-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./:/app
      - ./banks:/app/banks
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    depends_on:
      - ollama
    networks:
      - primebot-net

networks:
  primebot-net:
    name: primebot-net
