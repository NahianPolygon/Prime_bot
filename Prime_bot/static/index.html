<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Bank - Credit Card Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #fafafa;
      --surface:        #ffffff;
      --border:         #e8e8e8;
      --text-primary:   #111111;
      --text-secondary: #666666;
      --text-muted:     #999999;
      --accent:         #1a4f9c;
      --accent-light:   #e8f0fb;
      --accent-hover:   #153e7a;
      --user-bg:        #1a4f9c;
      --user-text:      #ffffff;
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.06);
      --radius:         12px;
      --radius-sm:      8px;
      --font:           'DM Sans', sans-serif;
      --font-mono:      'DM Mono', monospace;
      --success:        #22c55e;
      --error:          #ef4444;
      --warning:        #f59e0b;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-logo svg { width: 20px; height: 20px; fill: white; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
    .header-subtitle { font-size: 12px; color: var(--text-muted); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 12px; color: var(--text-muted); }
    .btn-clear { font-family: var(--font); font-size: 12px; font-weight: 500; color: var(--text-secondary); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; }
    .btn-clear:hover { background: var(--bg); color: var(--text-primary); border-color: #ccc; }

    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 48px 24px; text-align: center; gap: 24px; animation: fadeUp 0.5s ease both; }
    .welcome-icon { width: 64px; height: 64px; background: var(--accent-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
    .welcome-icon svg { width: 32px; height: 32px; fill: var(--accent); }
    .welcome h2 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
    .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; font-weight: 300; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion-chip { font-family: var(--font); font-size: 13px; color: var(--accent); background: var(--accent-light); border: 1px solid rgba(26,79,156,0.15); border-radius: 20px; padding: 7px 16px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .suggestion-chip:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .message-row { display: flex; gap: 10px; animation: fadeUp 0.25s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message-row.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .avatar.bot  { background: var(--accent-light); color: var(--accent); }
    .avatar.user { background: var(--user-bg); color: white; }

    .bubble { max-width: 75%; border-radius: var(--radius); font-size: 14px; line-height: 1.65; box-shadow: var(--shadow-sm); }
    .bubble.user { background: var(--user-bg); color: var(--user-text); padding: 12px 16px; border-top-right-radius: 4px; }
    .bubble.bot  { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); border-top-left-radius: 4px; padding: 12px 16px; overflow: hidden; }
    .bubble.bot.has-table { padding: 0; }

    .bubble-text   { padding: 12px 16px 8px; }
    .bubble-footer { padding: 8px 16px 12px; }

    .bubble.bot p, .bubble-text p, .bubble-footer p { margin-bottom: 8px; }
    .bubble.bot p:last-child, .bubble-text p:last-child, .bubble-footer p:last-child { margin-bottom: 0; }

    .bubble.bot ul, .bubble.bot ol,
    .bubble-text ul, .bubble-text ol,
    .bubble-footer ul, .bubble-footer ol { padding-left: 20px; margin: 6px 0 10px; }
    .bubble.bot li, .bubble-text li, .bubble-footer li { margin-bottom: 5px; }

    .bubble.bot h2, .bubble-text h2, .bubble-footer h2 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; letter-spacing: -0.01em; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .bubble.bot h3, .bubble-text h3, .bubble-footer h3 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; }
    .bubble.bot h1, .bubble-text h1 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; }

    .bubble.bot strong, .bubble-text strong, .bubble-footer strong { font-weight: 600; }
    .bubble.bot em, .bubble-text em, .bubble-footer em { font-style: italic; color: var(--text-secondary); }
    .bubble.bot code, .bubble-text code { font-family: var(--font-mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); }
    .bubble.bot blockquote, .bubble-text blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; font-style: italic; }

    .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .table-wrapper table { border-collapse: collapse; width: max-content; min-width: 100%; font-size: 13px; margin: 0; background: white; }
    .table-wrapper th { background: #f0f5ff; font-weight: 600; white-space: nowrap; padding: 9px 14px; border: 1px solid var(--border); color: var(--accent); }
    .table-wrapper td { padding: 8px 14px; border: 1px solid var(--border); vertical-align: top; min-width: 110px; max-width: 260px; word-break: break-word; }
    .table-wrapper tbody tr:nth-child(even) { background: #f7f9ff; }
    .table-wrapper tbody tr:hover { background: #eef3fd; }

    .thinking-indicator { display: flex; align-items: center; gap: 8px; padding: 12px 16px; }
    .thinking-text { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: thinking-pulse 1.4s infinite; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinking-pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap { flex: 1; }
    textarea { font-family: var(--font); font-size: 14px; color: var(--text-primary); width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 140px; overflow-y: auto; transition: border-color 0.15s; line-height: 1.5; }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,79,156,0.08); }
    .send-btn { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

    .elig-form { width: 100%; }
    .elig-form-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .elig-form-icon { width: 36px; height: 36px; background: var(--accent-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .elig-form-icon svg { width: 18px; height: 18px; fill: var(--accent); }
    .elig-form-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .elig-form-target { font-size: 12px; color: var(--accent); font-weight: 500; }
    .elig-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .elig-field { display: flex; flex-direction: column; gap: 4px; }
    .elig-field.full-width { grid-column: 1 / -1; }
    .elig-field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .elig-field label .req { color: var(--error); }
    .elig-field input[type="number"],
    .elig-field select { font-family: var(--font); font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text-primary); outline: none; transition: border-color 0.15s; width: 100%; }
    .elig-field input[type="number"]:focus,
    .elig-field select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,79,156,0.08); }
    .elig-field input[type="number"]::placeholder { color: var(--text-muted); }
    .elig-field input.field-error,
    .elig-field select.field-error { border-color: var(--error); }
    .elig-checkbox-row { display: flex; align-items: center; gap: 8px; padding: 10px 0 4px; grid-column: 1 / -1; }
    .elig-checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .elig-checkbox-row label { font-size: 13px; color: var(--text-primary); cursor: pointer; user-select: none; }
    .elig-form-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
    .elig-btn { font-family: var(--font); font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: none; }
    .elig-btn-submit { background: var(--accent); color: white; flex: 1; }
    .elig-btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .elig-btn-submit:disabled { background: var(--border); cursor: not-allowed; }
    .elig-btn-cancel { background: none; color: var(--text-secondary); border: 1px solid var(--border); }
    .elig-btn-cancel:hover { background: var(--bg); color: var(--text-primary); }
    .elig-form-errors { margin-top: 8px; }
    .elig-form-errors p { font-size: 12px; color: var(--error); margin: 2px 0; }
    .elig-form-submitted { opacity: 0.6; pointer-events: none; }

    .elig-bubble { max-width: 420px; padding: 16px !important; }

    @media (max-width: 720px) {
      .bubble { max-width: 94%; }
      .elig-bubble { max-width: 94%; }
      .elig-form-grid { grid-template-columns: 1fr; }
      .table-wrapper td, .table-wrapper th { font-size: 12px; padding: 6px 10px; min-width: 80px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      </div>
      <div>
        <div class="header-title">Prime Bank Assistant</div>
        <div class="header-subtitle">Credit Card Help & Guidance</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting...</span>
      <button class="btn-clear" onclick="clearConversation()">New chat</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <h2>How can I help you today?</h2>
      <p>I can help you find the right Prime Bank credit card, check your eligibility, compare products, or assist with your existing card.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion('What credit cards does Prime Bank offer?')">What cards do you offer?</button>
        <button class="suggestion-chip" onclick="sendSuggestion('I need a halal credit card')">Halal / Islamic card</button>
        <button class="suggestion-chip" onclick="sendSuggestion('Am I eligible for a credit card?')">Check my eligibility</button>
        <button class="suggestion-chip" onclick="sendSuggestion('Compare Visa Gold and Visa Platinum')">Compare cards</button>
        <button class="suggestion-chip" onclick="sendSuggestion('How do I apply for a credit card?')">How to apply</button>
        <button class="suggestion-chip" onclick="sendSuggestion('I lost my card, what should I do?')">Lost card help</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="inputBox" placeholder="Ask about credit cards, eligibility, fees..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">
      Press <kbd style="font-family:var(--font-mono);font-size:10px;background:#f0f0f0;padding:1px 4px;border-radius:3px;border:1px solid #ddd;">Enter</kbd> to send ·
      <kbd style="font-family:var(--font-mono);font-size:10px;background:#f0f0f0;padding:1px 4px;border-radius:3px;border:1px solid #ddd;">Shift+Enter</kbd> for new line
    </div>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const messagesEl  = document.getElementById("messages");
  const welcomeEl   = document.getElementById("welcome");
  const inputEl     = document.getElementById("inputBox");
  const sendBtnEl   = document.getElementById("sendBtn");
  const statusDot   = document.getElementById("statusDot");
  const statusText  = document.getElementById("statusText");

  let sessionId       = null;
  let isLoading       = false;
  let ws              = null;
  let wsReady         = false;
  let reconnectDelay  = 1000;
  let reconnectTimer  = null;
  let pingInterval    = null;
  let activeBubble    = null;
  let activeThinkId   = null;
  let fullText        = "";
  let activeFormId    = null;

  function wsUrl() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    return `${proto}://${location.host}/ws/chat`;
  }

  function connect() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

    setStatus("connecting");
    ws = new WebSocket(wsUrl());

    ws.onopen = () => {
      wsReady = true;
      reconnectDelay = 1000;
      setStatus("online");
      setInputEnabled(true);
      inputEl.focus();
      pingInterval = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
      }, 25000);
    };

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }
      handleServerMessage(data);
    };

    ws.onclose = () => {
      wsReady = false;
      clearInterval(pingInterval);
      setStatus("offline");
      setInputEnabled(false);
      if (isLoading) finishLoading();
      reconnectTimer = setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 2, 16000);
        connect();
      }, reconnectDelay);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  function handleServerMessage(data) {
    switch (data.type) {
      case "session_id":
        sessionId = data.session_id;
        break;

      case "show_eligibility_form":
        if (activeThinkId) { removeThinking(activeThinkId); activeThinkId = null; }
        activeBubble = null;
        fullText = "";
        renderEligibilityForm(data.schema);
        finishLoading();
        break;

      case "token":
        if (!activeBubble) {
          if (activeThinkId) { removeThinking(activeThinkId); activeThinkId = null; }
          const created = createBotBubble();
          activeBubble = created.bubble;
          fullText = "";
        }
        fullText += data.token;
        renderBotBubble(activeBubble, fullText);
        scrollToBottom();
        break;

      case "done":
        activeBubble = null;
        fullText = "";
        finishLoading();
        break;

      case "cleared":
        sessionId = null;
        break;

      case "error":
        if (activeThinkId) { removeThinking(activeThinkId); activeThinkId = null; }
        activeBubble = null;
        fullText = "";
        appendBubble("bot", "Sorry, something went wrong. Please try again or call **16218**.");
        finishLoading();
        break;

      case "pong":
        break;
    }
  }

  function renderEligibilityForm(schema) {
    const formId = "elig_" + Date.now();
    activeFormId = formId;

    const row = document.createElement("div");
    row.className = "message-row bot";
    row.id = formId + "_row";

    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "P";

    const bubble = document.createElement("div");
    bubble.className = "bubble bot elig-bubble";

    const targetCard = schema.target_card || "";
    const fields = schema.fields || {};

    let targetHtml = "";
    if (targetCard) {
      targetHtml = `<div class="elig-form-target">Checking eligibility for: <strong>${targetCard}</strong></div>`;
    }

    let fieldsHtml = "";
    const fieldKeys = Object.keys(fields);

    for (const key of fieldKeys) {
      const f = fields[key];
      const reqMark = f.required ? '<span class="req">*</span>' : "";

      if (f.type === "number") {
        fieldsHtml += `
          <div class="elig-field">
            <label for="${formId}_${key}">${f.label} ${reqMark}</label>
            <input type="number" id="${formId}_${key}" data-key="${key}"
              placeholder="${f.placeholder || ""}"
              ${f.min !== undefined ? 'min="' + f.min + '"' : ""}
              ${f.max !== undefined ? 'max="' + f.max + '"' : ""} />
          </div>`;
      } else if (f.type === "select") {
        let opts = '<option value="" disabled selected>Select...</option>';
        for (const o of (f.options || [])) {
          opts += `<option value="${o.value}">${o.label}</option>`;
        }
        fieldsHtml += `
          <div class="elig-field">
            <label for="${formId}_${key}">${f.label} ${reqMark}</label>
            <select id="${formId}_${key}" data-key="${key}">${opts}</select>
          </div>`;
      } else if (f.type === "checkbox") {
        fieldsHtml += `
          <div class="elig-checkbox-row">
            <input type="checkbox" id="${formId}_${key}" data-key="${key}" />
            <label for="${formId}_${key}">${f.label}</label>
          </div>`;
      }
    }

    bubble.innerHTML = `
      <div class="elig-form" id="${formId}">
        <div class="elig-form-header">
          <div class="elig-form-icon">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
          </div>
          <div>
            <div class="elig-form-title">Eligibility Check</div>
            ${targetHtml}
          </div>
        </div>
        <div class="elig-form-grid">
          ${fieldsHtml}
        </div>
        <div class="elig-form-errors" id="${formId}_errors"></div>
        <div class="elig-form-actions">
          <button class="elig-btn elig-btn-cancel" onclick="cancelEligForm('${formId}')">Cancel</button>
          <button class="elig-btn elig-btn-submit" id="${formId}_submit" onclick="submitEligForm('${formId}', '${targetCard}')">Check Eligibility</button>
        </div>
      </div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function submitEligForm(formId, targetCard) {
    const formEl = document.getElementById(formId);
    if (!formEl) return;

    const errorsEl = document.getElementById(formId + "_errors");
    errorsEl.innerHTML = "";

    const inputs = formEl.querySelectorAll("input[data-key], select[data-key]");
    const formData = {};
    const errors = [];

    inputs.forEach(el => {
      const key = el.dataset.key;
      if (el.type === "checkbox") {
        formData[key] = el.checked;
      } else if (el.type === "number") {
        formData[key] = el.value.trim() !== "" ? Number(el.value) : null;
      } else {
        formData[key] = el.value;
      }
    });

    if (!formData.age || formData.age < 18 || formData.age > 70) {
      errors.push("Age must be between 18 and 70.");
      markFieldError(formId, "age");
    }
    if (!formData.employment_type) {
      errors.push("Please select an employment status.");
      markFieldError(formId, "employment_type");
    }
    if (!formData.monthly_income || formData.monthly_income <= 0) {
      errors.push("Please enter a valid monthly income.");
      markFieldError(formId, "monthly_income");
    }
    if (formData.employment_duration_years === null || formData.employment_duration_years === "" || formData.employment_duration_years === undefined) {
      errors.push("Please select employment duration (years).");
      markFieldError(formId, "employment_duration_years");
    }

    if (errors.length > 0) {
      errorsEl.innerHTML = errors.map(e => `<p>${e}</p>`).join("");
      scrollToBottom();
      return;
    }

    if (targetCard) {
      formData.target_card = targetCard;
    }

    formEl.classList.add("elig-form-submitted");
    const submitBtn = document.getElementById(formId + "_submit");
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Checking...";
    }

    activeThinkId = showThinking();
    startLoading();

    ws.send(JSON.stringify({
      type: "eligibility_form_submit",
      form_data: formData,
      session_id: sessionId,
    }));
  }

  function cancelEligForm(formId) {
    const row = document.getElementById(formId + "_row");
    if (row) row.remove();
    activeFormId = null;
  }

  function markFieldError(formId, key) {
    const el = document.getElementById(formId + "_" + key);
    if (el) el.classList.add("field-error");
    if (el) {
      el.addEventListener("input", () => el.classList.remove("field-error"), { once: true });
      el.addEventListener("change", () => el.classList.remove("field-error"), { once: true });
    }
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading || !wsReady) return;

    if (welcomeEl) welcomeEl.style.display = "none";
    appendBubble("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";

    activeThinkId = showThinking();
    startLoading();

    ws.send(JSON.stringify({ type: "message", message: text, session_id: sessionId }));
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    autoResize(inputEl);
    sendMessage();
  }

  function startLoading() {
    isLoading = true;
    sendBtnEl.disabled = true;
    inputEl.disabled = true;
  }

  function finishLoading() {
    isLoading = false;
    if (wsReady) {
      sendBtnEl.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  function setInputEnabled(enabled) {
    if (!isLoading) {
      sendBtnEl.disabled = !enabled;
      inputEl.disabled = !enabled;
    }
  }

  function setStatus(s) {
    const map = {
      online:     { color: "#22c55e", anim: "pulse-dot 2s infinite", label: "Online" },
      offline:    { color: "#ef4444", anim: "none",                  label: "Reconnecting..." },
      connecting: { color: "#f59e0b", anim: "pulse-dot 1s infinite", label: "Connecting..." },
    };
    const cfg = map[s] || map.offline;
    statusDot.style.background  = cfg.color;
    statusDot.style.animation   = cfg.anim;
    statusText.textContent      = cfg.label;
  }

  function clearConversation() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "clear", session_id: sessionId }));
    }
    sessionId = null;
    activeBubble = null;
    fullText = "";
    activeFormId = null;
    if (activeThinkId) { removeThinking(activeThinkId); activeThinkId = null; }
    messagesEl.querySelectorAll(".message-row").forEach(el => el.remove());
    if (welcomeEl) welcomeEl.style.display = "flex";
    if (!isLoading) finishLoading();
  }

  function fixMarkdown(raw) {
    let t = (raw || "").replace(/\r\n/g, "\n");
    let lines = t.split("\n");
    let result = [];
    let inTable = false;
    let headerSepSeen = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      let trimmed = line.trim();
      let isPipeLine = trimmed.startsWith("|") && trimmed.endsWith("|") && trimmed.length > 2;
      let isSepLine = /^\|[\s\-:|]+\|$/.test(trimmed);

      if (isPipeLine || isSepLine) {
        if (!inTable) {
          if (result.length > 0 && result[result.length - 1].trim() !== "") result.push("");
          inTable = true;
          headerSepSeen = false;
        }
        if (isSepLine) {
          if (!headerSepSeen) { headerSepSeen = true; result.push(trimmed); }
        } else {
          if (inTable && !headerSepSeen) {
            let nextLine = (i + 1 < lines.length) ? lines[i + 1].trim() : "";
            let nextIsSep = /^\|[\s\-:|]+\|$/.test(nextLine);
            if (!nextIsSep) {
              result.push(trimmed);
              let cols = (trimmed.match(/\|/g) || []).length - 1;
              if (cols < 1) cols = 1;
              result.push("|" + " --- |".repeat(cols));
              headerSepSeen = true;
              continue;
            }
          }
          result.push(trimmed);
        }
      } else if (inTable && trimmed === "") {
        continue;
      } else {
        if (inTable) { result.push(""); inTable = false; headerSepSeen = false; }
        if (/^-{3,}$/.test(trimmed) || /^={3,}$/.test(trimmed)) continue;
        result.push(line);
      }
    }

    t = result.join("\n");
    t = t.replace(/\n{3,}/g, "\n\n");
    t = t.replace(/([^\n])\n(#{1,3}\s)/g, "\$1\n\n\$2");
    return t.trim();
  }

  function renderBotBubble(bubble, rawText) {
    const md   = fixMarkdown(rawText);
    const html = marked.parse(md);

    if (!/<table[\s>]/i.test(html)) {
      bubble.innerHTML = html;
      return;
    }

    bubble.classList.add("has-table");
    bubble.innerHTML = "";

    const tStart  = html.search(/<table[\s>]/i);
    const tEndIdx = html.lastIndexOf("</table>");
    const tEnd    = tEndIdx >= 0 ? tEndIdx + "</table>".length : html.length;

    const before = html.slice(0, tStart).trim();
    const table  = html.slice(tStart, tEnd).trim();
    const after  = html.slice(tEnd).trim();

    if (before) { const d = document.createElement("div"); d.className = "bubble-text"; d.innerHTML = before; bubble.appendChild(d); }
    const wrapper = document.createElement("div"); wrapper.className = "table-wrapper"; wrapper.innerHTML = table; bubble.appendChild(wrapper);
    if (after)  { const d = document.createElement("div"); d.className = "bubble-footer"; d.innerHTML = after; bubble.appendChild(d); }
  }

  function createBotBubble() {
    const row    = document.createElement("div"); row.className = "message-row bot";
    const avatar = document.createElement("div"); avatar.className = "avatar bot"; avatar.textContent = "P";
    const bubble = document.createElement("div"); bubble.className = "bubble bot";
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return { row, bubble };
  }

  function appendBubble(role, text) {
    const row    = document.createElement("div"); row.className = `message-row ${role}`;
    const avatar = document.createElement("div"); avatar.className = `avatar ${role}`; avatar.textContent = role === "user" ? "U" : "P";
    const bubble = document.createElement("div"); bubble.className = `bubble ${role}`;
    if (role === "bot") renderBotBubble(bubble, text); else bubble.textContent = text;
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showThinking() {
    const id  = "think_" + Date.now();
    const row = document.createElement("div");
    row.id = id; row.className = "message-row bot";
    row.innerHTML = `<div class="avatar bot">P</div>
      <div class="bubble bot" style="padding:0;">
        <div class="thinking-indicator">
          <span class="thinking-text">Thinking</span>
          <div class="thinking-dots">
            <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
          </div>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollToBottom() {
    requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
  }

  connect();
</script>
</body>
</html>
