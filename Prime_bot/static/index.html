<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Bank - Credit Card Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #fafafa;
      --surface:        #ffffff;
      --border:         #e8e8e8;
      --text-primary:   #111111;
      --text-secondary: #666666;
      --text-muted:     #999999;
      --accent:         #1a4f9c;
      --accent-light:   #e8f0fb;
      --accent-hover:   #153e7a;
      --user-bg:        #1a4f9c;
      --user-text:      #ffffff;
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.06);
      --radius:         12px;
      --radius-sm:      8px;
      --font:           'DM Sans', sans-serif;
      --font-mono:      'DM Mono', monospace;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-logo svg { width: 20px; height: 20px; fill: white; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
    .header-subtitle { font-size: 12px; color: var(--text-muted); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 12px; color: var(--text-muted); }
    .btn-clear { font-family: var(--font); font-size: 12px; font-weight: 500; color: var(--text-secondary); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; }
    .btn-clear:hover { background: var(--bg); color: var(--text-primary); border-color: #ccc; }

    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 48px 24px; text-align: center; gap: 24px; animation: fadeUp 0.5s ease both; }
    .welcome-icon { width: 64px; height: 64px; background: var(--accent-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
    .welcome-icon svg { width: 32px; height: 32px; fill: var(--accent); }
    .welcome h2 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
    .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; font-weight: 300; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion-chip { font-family: var(--font); font-size: 13px; color: var(--accent); background: var(--accent-light); border: 1px solid rgba(26,79,156,0.15); border-radius: 20px; padding: 7px 16px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .suggestion-chip:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .message-row { display: flex; gap: 10px; animation: fadeUp 0.25s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message-row.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .avatar.bot  { background: var(--accent-light); color: var(--accent); }
    .avatar.user { background: var(--user-bg); color: white; }

    .bubble { max-width: 75%; border-radius: var(--radius); font-size: 14px; line-height: 1.65; box-shadow: var(--shadow-sm); }
    .bubble.user { background: var(--user-bg); color: var(--user-text); padding: 12px 16px; border-top-right-radius: 4px; }
    .bubble.bot  { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); border-top-left-radius: 4px; padding: 12px 16px; overflow: hidden; }
    .bubble.bot.has-table { padding: 0; }

    .bubble-text   { padding: 12px 16px 8px; }
    .bubble-footer { padding: 8px 16px 12px; }

    .bubble.bot p, .bubble-text p, .bubble-footer p { margin-bottom: 8px; }
    .bubble.bot p:last-child, .bubble-text p:last-child, .bubble-footer p:last-child { margin-bottom: 0; }

    .bubble.bot ul, .bubble.bot ol,
    .bubble-text ul, .bubble-text ol,
    .bubble-footer ul, .bubble-footer ol { padding-left: 20px; margin: 6px 0 10px; }
    .bubble.bot li, .bubble-text li, .bubble-footer li { margin-bottom: 5px; }

    .bubble.bot h2, .bubble-text h2, .bubble-footer h2 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; letter-spacing: -0.01em; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .bubble.bot h3, .bubble-text h3, .bubble-footer h3 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; }
    .bubble.bot h1, .bubble-text h1 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; }

    .bubble.bot strong, .bubble-text strong, .bubble-footer strong { font-weight: 600; }
    .bubble.bot em, .bubble-text em, .bubble-footer em { font-style: italic; color: var(--text-secondary); }
    .bubble.bot code, .bubble-text code { font-family: var(--font-mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); }
    .bubble.bot blockquote, .bubble-text blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; font-style: italic; }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .table-wrapper table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
      margin: 0;
      background: white;
    }
    .table-wrapper th {
      background: #f0f5ff;
      font-weight: 600;
      white-space: nowrap;
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .table-wrapper td {
      padding: 8px 14px;
      border: 1px solid var(--border);
      vertical-align: top;
      min-width: 110px;
      max-width: 260px;
      word-break: break-word;
    }
    .table-wrapper tbody tr:nth-child(even) { background: #f7f9ff; }
    .table-wrapper tbody tr:hover { background: #eef3fd; }

    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typing-bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap { flex: 1; }
    textarea { font-family: var(--font); font-size: 14px; color: var(--text-primary); width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 140px; overflow-y: auto; transition: border-color 0.15s; line-height: 1.5; }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,79,156,0.08); }
    .send-btn { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

    @media (max-width: 720px) {
      .bubble { max-width: 94%; }
      .table-wrapper td, .table-wrapper th { font-size: 12px; padding: 6px 10px; min-width: 80px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      </div>
      <div>
        <div class="header-title">Prime Bank Assistant</div>
        <div class="header-subtitle">Credit Card Help & Guidance</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Online</span>
      <button class="btn-clear" onclick="clearConversation()">New chat</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <h2>How can I help you today?</h2>
      <p>I can help you find the right Prime Bank credit card, check your eligibility, compare products, or assist with your existing card.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion('What credit cards does Prime Bank offer?')">What cards do you offer?</button>
        <button class="suggestion-chip" onclick="sendSuggestion('I need a halal credit card')">Halal / Islamic card</button>
        <button class="suggestion-chip" onclick="sendSuggestion('Am I eligible for a credit card?')">Check my eligibility</button>
        <button class="suggestion-chip" onclick="sendSuggestion('Compare Visa Gold and Visa Platinum')">Compare cards</button>
        <button class="suggestion-chip" onclick="sendSuggestion('How do I apply for a credit card?')">How to apply</button>
        <button class="suggestion-chip" onclick="sendSuggestion('I lost my card, what should I do?')">Lost card help</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="inputBox" placeholder="Ask about credit cards, eligibility, fees..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">
      Press <kbd style="font-family:var(--font-mono);font-size:10px;background:#f0f0f0;padding:1px 4px;border-radius:3px;border:1px solid #ddd;">Enter</kbd> to send ·
      <kbd style="font-family:var(--font-mono);font-size:10px;background:#f0f0f0;padding:1px 4px;border-radius:3px;border:1px solid #ddd;">Shift+Enter</kbd> for new line
    </div>
  </div>
</div>

<script>
  let sessionId = null;
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const welcomeEl  = document.getElementById("welcome");
  const inputEl    = document.getElementById("inputBox");
  const sendBtnEl  = document.getElementById("sendBtn");
  const statusDot  = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");

  marked.setOptions({ breaks: true, gfm: true });

    function fixMarkdown(raw) {
  let t = (raw || "").replace(/\r\n/g, "\n");

  t = repairTable(t);

  let lines = t.split("\n");
  let result = [];
  let inTable = false;
  let headerSepSeen = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    let trimmed = line.trim();
    let isPipeLine = trimmed.startsWith("|") && trimmed.endsWith("|") && trimmed.length > 2;
    let isSepLine = /^\|[\s\-:|]+\|$/.test(trimmed);

    if (isPipeLine || isSepLine) {
      if (!inTable) {
        if (result.length > 0 && result[result.length - 1].trim() !== "") {
          result.push("");
        }
        inTable = true;
        headerSepSeen = false;
      }

      if (isSepLine) {
        if (!headerSepSeen) {
          headerSepSeen = true;
          result.push(trimmed);
        }
      } else {
        result.push(trimmed);
      }

    } else if (inTable && trimmed === "") {
      continue;
    } else {
      if (inTable) {
        result.push("");
        inTable = false;
        headerSepSeen = false;
      }
      if (/^-{3,}$/.test(trimmed) || /^={3,}$/.test(trimmed)) {
        continue;
      }
      result.push(line);
    }
  }

  t = result.join("\n");

  t = t.replace(
    /((?:\|[^\n]+\|\n)(?!\s*\|[\s\-:|]+\|))/g,
    function (match) {
      let headerLine = match.trimEnd().replace(/\n$/, "");
      let cols = (headerLine.match(/\|/g) || []).length - 1;
      if (cols < 1) cols = 1;
      let sep = "|" + " --- |".repeat(cols);
      return headerLine + "\n" + sep + "\n";
    }
  );

  t = t.replace(/\n{3,}/g, "\n\n");
  t = t.replace(/([^\n])\n(#{1,3}\s)/g, "\$1\n\n\$2");
  return t.trim();
}

function repairTable(text) {
  let lines = text.split("\n");
  let result = [];

  for (let li = 0; li < lines.length; li++) {
    let stripped = lines[li].trim();

    if (!(stripped.startsWith("|") && stripped.endsWith("|"))) {
      result.push(lines[li]);
      continue;
    }

    let rawCells = stripped.split("|").slice(1, -1);

    let sepIndices = [];
    for (let i = 0; i < rawCells.length; i++) {
      if (/^[\s\-:]+$/.test(rawCells[i]) && rawCells[i].trim().length >= 3) {
        sepIndices.push(i);
      }
    }

    if (sepIndices.length < 2) {
      result.push(lines[li]);
      continue;
    }

    let bestStart = sepIndices[0];
    let bestLen = 1;
    let currStart = sepIndices[0];
    let currLen = 1;

    for (let i = 1; i < sepIndices.length; i++) {
      if (sepIndices[i] === sepIndices[i - 1] + 1) {
        currLen++;
      } else {
        if (currLen > bestLen) {
          bestStart = currStart;
          bestLen = currLen;
        }
        currStart = sepIndices[i];
        currLen = 1;
      }
    }
    if (currLen > bestLen) {
      bestStart = currStart;
      bestLen = currLen;
    }

    let colCount = bestLen;

    if (colCount < 2 || rawCells.length <= colCount) {
      result.push(lines[li]);
      continue;
    }

    for (let i = 0; i < rawCells.length; i += colCount) {
      let chunk = rawCells.slice(i, i + colCount);
      while (chunk.length < colCount) {
        chunk.push(" N/A ");
      }
      result.push("|" + chunk.join("|") + "|");
    }
  }

  return result.join("\n");
}
  function renderBotBubble(bubble, rawText) {
    const md   = fixMarkdown(rawText);
    const html = marked.parse(md);

    if (!/<table[\s>]/i.test(html)) {
      bubble.innerHTML = html;
      return;
    }

    bubble.classList.add("has-table");
    bubble.innerHTML = "";

    const tStart  = html.search(/<table[\s>]/i);
    const tEndIdx = html.lastIndexOf("</table>");
    const tEnd    = tEndIdx >= 0 ? tEndIdx + "</table>".length : html.length;

    const before = html.slice(0, tStart).trim();
    const table  = html.slice(tStart, tEnd).trim();
    const after  = html.slice(tEnd).trim();

    if (before) {
      const d = document.createElement("div");
      d.className = "bubble-text";
      d.innerHTML = before;
      bubble.appendChild(d);
    }

    const wrapper = document.createElement("div");
    wrapper.className = "table-wrapper";
    wrapper.innerHTML = table;
    bubble.appendChild(wrapper);

    if (after) {
      const d = document.createElement("div");
      d.className = "bubble-footer";
      d.innerHTML = after;
      bubble.appendChild(d);
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    autoResize(inputEl);
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (welcomeEl) welcomeEl.style.display = "none";
    appendBubble("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";

    const typingId = showTyping();
    setLoading(true);

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      sessionId = data.session_id;
      removeTyping(typingId);
      appendBubble("bot", data.response);
    } catch (err) {
      removeTyping(typingId);
      appendBubble("bot", "Sorry, I'm having trouble connecting. Please try again or call **16218**.");
      setStatus("offline");
    } finally {
      setLoading(false);
    }
  }

  function appendBubble(role, text) {
    const row    = document.createElement("div");
    row.className = `message-row ${role}`;

    const avatar    = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "user" ? "U" : "P";

    const bubble    = document.createElement("div");
    bubble.className = `bubble ${role}`;

    if (role === "bot") {
      renderBotBubble(bubble, text);
    } else {
      bubble.textContent = text;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showTyping() {
    const id  = "t_" + Date.now();
    const row = document.createElement("div");
    row.id = id; row.className = "message-row bot";
    row.innerHTML = `<div class="avatar bot">P</div>
      <div class="bubble bot" style="padding:10px 16px;">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
  function scrollToBottom() { requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }

  function setLoading(val) {
    isLoading = sendBtnEl.disabled = inputEl.disabled = val;
    if (!val) inputEl.focus();
  }

  function setStatus(s) {
    statusDot.style.background = s === "offline" ? "#ef4444" : "#22c55e";
    statusDot.style.animation  = s === "offline" ? "none" : "pulse-dot 2s infinite";
    statusText.textContent     = s === "offline" ? "Offline" : "Online";
  }

  async function clearConversation() {
    if (sessionId) {
      try { await fetch("/clear", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ session_id: sessionId }) }); } catch (_) {}
    }
    sessionId = null;
    messagesEl.querySelectorAll(".message-row").forEach(el => el.remove());
    if (welcomeEl) welcomeEl.style.display = "flex";
    inputEl.focus();
  }

  window.addEventListener("load", () => inputEl.focus());
</script>
</body>
</html>
